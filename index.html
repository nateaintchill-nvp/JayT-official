<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayT - Official DJ Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #080707; color: #ffffff; overflow-x: hidden; scroll-behavior: smooth; }


        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .text-red { color: #ff0033; }


        header { position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(8, 7, 7, 0.9); backdrop-filter: blur(5px); }
        .header-logo img { height: 40px; mix-blend-mode: screen; filter: drop-shadow(0 0 10px #ff0033); }


        .hero { min-height: 100vh; padding-top: 150px; display: flex; align-items: center; }
        .hero-top-layout { display: flex; justify-content: space-between; align-items: center; gap: 60px; }
       
        /* Cột trái: Căn giữa logo và chữ */
        .hero-left-col { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
       
        .hero-logo-img { width: 300px; height: auto; mix-blend-mode: screen; filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.8)); margin-bottom: 20px; }
       
        .main-real-name { font-size: 40px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .hero-name { font-size: 18px; letter-spacing: 6px; text-transform: uppercase; color: #ccc; }


        /* Cột phải: Khung ảnh ngang hàng */
        .hero-right-col { width: 500px; }
        .hero-large-img { width: 100%; height: 350px; border: 1px solid #333; overflow: hidden; }
        .hero-large-img img { width: 100%; height: 100%; object-fit: cover; }


        @media (max-width: 968px) {
            .hero-top-layout { flex-direction: column; text-align: center; }
            .hero-right-col { width: 100%; }
            .hero-logo-img { width: 200px; }
        }
    </style>
</head>
<body>


    <header>
        <div class="header-logo"><img src="logo2.png" alt="Logo"></div>
    </header>


    <section class="hero">
        <div class="container">
            <div class="hero-top-layout">
                <div class="hero-left-col">
                    <img src="logo2.png" alt="JayT" class="hero-logo-img">
                    <div class="main-real-name"><span class="text-red">T</span>RẦN MINH <span class="text-red">T</span>RÍ</div>
                    <div class="hero-name">DJ / DANCER / EVENT SET UP</div>
                </div>
               
                <div class="hero-right-col">
                    <div class="hero-large-img">
                        <img src="IMG_3985.JPG" alt="DJ Performance">
                    </div>
                </div>
            </div>
        </div>
    </section>


</body>
</html>
